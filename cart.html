<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина — Red Line</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="top">
    <!-- Шапка сайта -->
    <header class="site-header">
        <div class="header-content">
            <a href="index.html" class="logo">Red<span>Line</span></a>
            <nav>
                <ul class="nav-menu">
                    <li><a href="index.html#top" class="nav-link">Главная</a></li>
            <li><a href="index.html#products" class="nav-link">Каталог</a></li>
            <li><a href="index.html#about" class="nav-link">О нас</a></li>
            <li><a href="index.html#contact" class="nav-link">Контакты</a></li>
                </ul>
            </nav>
            <div class="cart-icon">
                <a href="cart.html">
                    🛒 <span id="cart-count-cart">0</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Содержимое корзины -->
    <section class="section">
        <h2 class="section-title">Ваша корзина</h2>
        <div id="cart-items">
            <p>Корзина пуста</p>
        </div>

        <div class="cart-total">
            <h3>Итого: <span id="total-price">0</span> руб.</h3>
        </div>

        <form id="checkout-form" class="checkout-form">
            <h3>Оформление заказа</h3>
            <div class="form-group">
                <label for="customer-name">Имя</label>
                <input type="text" id="customer-name" name="name" required>
            </div>
            <div class="form-group">
                <label for="customer-phone">Телефон</label>
                <input type="tel" id="customer-phone" name="phone" required>
            </div>
            <div class="form-group">
                <label for="customer-email">Email</label>
                <input type="email" id="customer-email" name="email" required>
            </div>
            <button type="submit" class="btn">Оформить заказ</button>
        </form>
    </section>

    <script src="cart.js"></script>
</body>
</html>
